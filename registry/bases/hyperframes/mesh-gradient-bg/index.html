<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesh Gradient Background</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .mesh-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(
            ellipse at 20% 50%,
            rgba(99, 102, 241, 0.4) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(139, 92, 246, 0.3) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 50% 80%,
            rgba(59, 130, 246, 0.3) 0%,
            transparent 50%
          ),
          #0a0a0f;
      }
      .mesh-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.5;
      }
      .blob-1 {
        width: 500px;
        height: 500px;
        background: #6366f1;
        top: 10%;
        left: 15%;
      }
      .blob-2 {
        width: 400px;
        height: 400px;
        background: #8b5cf6;
        top: 30%;
        right: 20%;
      }
      .blob-3 {
        width: 450px;
        height: 450px;
        background: #3b82f6;
        bottom: 10%;
        left: 40%;
      }
      .scene-content {
        position: relative;
        z-index: 10;
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 24px;
        box-sizing: border-box;
      }
      .title {
        font-size: 80px;
        font-weight: 800;
        color: white;
        text-align: center;
      }
      .subtitle {
        font-size: 28px;
        color: rgba(255, 255, 255, 0.7);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="mesh-gradient-bg"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="mesh-bg">
        <div class="mesh-blob blob-1" id="blob-1"></div>
        <div class="mesh-blob blob-2" id="blob-2"></div>
        <div class="mesh-blob blob-3" id="blob-3"></div>
      </div>
      <div class="scene-content">
        <div class="title">Mesh Gradient</div>
        <div class="subtitle">Animated fluid color backgrounds</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#blob-1",
        {
          x: 100,
          y: 50,
          duration: 4,
          ease: "sine.inOut",
          repeat: 1,
          yoyo: true,
        },
        0
      );
      tl.to(
        "#blob-2",
        {
          x: -80,
          y: 60,
          duration: 5,
          ease: "sine.inOut",
          repeat: 1,
          yoyo: true,
        },
        0
      );
      tl.to(
        "#blob-3",
        {
          x: 60,
          y: -40,
          duration: 4.5,
          ease: "sine.inOut",
          repeat: 1,
          yoyo: true,
        },
        0
      );

      window.__timelines["mesh-gradient-bg"] = tl;
    </script>
  </body>
</html>
