<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masked Slide Reveal</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #scene1 {
        z-index: 1;
        background: #0a0a0f;
      }
      #scene2 {
        z-index: 2;
        background: #0f0f1a;
        clip-path: inset(0 100% 0 0);
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 24px;
        box-sizing: border-box;
      }
      .s1-title {
        font-size: 120px;
        font-weight: 800;
        color: #e2e2e8;
        letter-spacing: -0.03em;
      }
      .s1-subtitle {
        font-size: 42px;
        font-weight: 400;
        color: #8a8a9a;
      }
      .s2-heading {
        font-size: 100px;
        font-weight: 800;
        color: #60a5fa;
        letter-spacing: -0.02em;
      }
      .s2-text {
        font-size: 36px;
        font-weight: 300;
        color: #9aa0b0;
      }
      .s2-tag {
        font-size: 20px;
        font-weight: 600;
        color: #3b82f6;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.12;
        pointer-events: none;
      }
      .glow-blue {
        background: #3b82f6;
        top: -150px;
        right: -100px;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #60a5fa;
        border-radius: 2px;
      }
      .mask-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        background: #0a0a0f;
        transform-origin: left center;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="masked-slide-reveal"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div id="scene1" class="scene">
        <div class="scene-content">
          <div class="s1-title">Hidden</div>
          <div class="s1-subtitle">Content behind the mask</div>
        </div>
      </div>
      <div id="scene2" class="scene">
        <div class="glow glow-blue"></div>
        <div class="scene-content">
          <div class="s2-tag">Revealed</div>
          <div class="line"></div>
          <div class="s2-heading">Unmasked</div>
          <div class="s2-text">Sliding mask reveals new content</div>
        </div>
      </div>
      <div class="mask-bar" id="mask-bar"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var T = 3.5;
      var revealDuration = 0.7;

      tl.to(
        "#scene2",
        {
          clipPath: "inset(0 0% 0 0)",
          duration: revealDuration,
          ease: "power3.inOut",
        },
        T
      );

      tl.to(
        "#mask-bar",
        {
          scaleX: 0,
          duration: revealDuration,
          ease: "power3.inOut",
        },
        T
      );

      tl.fromTo(
        "#s2-tag",
        { x: -25, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
        T + 0.15
      );
      tl.fromTo(
        ".line",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.35, ease: "power2.out" },
        T + 0.25
      );
      tl.fromTo(
        "#s2-heading",
        { x: -35, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.5, ease: "expo.out" },
        T + 0.3
      );
      tl.fromTo(
        "#s2-text",
        { x: -25, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
        T + 0.45
      );

      tl.to("#scene1", { opacity: 0, duration: 0.01 }, T + revealDuration);
      tl.to("#mask-bar", { opacity: 0, duration: 0.01 }, T + revealDuration);

      window.__timelines["masked-slide-reveal"] = tl;
    </script>
  </body>
</html>
