<template id="masked-slide-reveal-template">
  <div
    data-composition-id="masked-slide-reveal"
    data-width="1920"
    data-height="1080"
  >
    <style>
      [data-composition-id="masked-slide-reveal"] {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      [data-composition-id="masked-slide-reveal"] .ms-scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      [data-composition-id="masked-slide-reveal"] .ms-scene-out {
        z-index: 1;
      }
      [data-composition-id="masked-slide-reveal"] .ms-scene-in {
        z-index: 2;
      }
      [data-composition-id="masked-slide-reveal"] .ms-mask {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        background: var(--ms-mask-bg, #0a0a0f);
        transform-origin: left center;
      }
    </style>
    <div class="ms-scene ms-scene-out" id="ms-out"></div>
    <div
      class="ms-scene ms-scene-in"
      id="ms-in"
      style="clip-path: inset(0 100% 0 0)"
    ></div>
    <div class="ms-mask" id="ms-mask"></div>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        var vars = window.__hyperframes
          ? window.__hyperframes.getVariables()
          : {};
        var direction = vars.direction || "left";
        var duration = vars.transitionDuration || 0.7;
        var maskBg = vars.maskColor || "#0a0a0f";

        var T = 0;
        var startClip, endClip;
        if (direction === "left") {
          startClip = "inset(0 100% 0 0)";
          endClip = "inset(0 0% 0 0)";
        } else if (direction === "right") {
          startClip = "inset(0 0 0 100%)";
          endClip = "inset(0 0 0 0%)";
        } else if (direction === "top") {
          startClip = "inset(0 0 100% 0)";
          endClip = "inset(0 0 0% 0)";
        } else {
          startClip = "inset(100% 0 0 0)";
          endClip = "inset(0% 0 0 0)";
        }

        document.getElementById("ms-mask").style.background = maskBg;
        document.getElementById("ms-in").style.clipPath = startClip;

        tl.to(
          "#ms-in",
          { clipPath: endClip, duration: duration, ease: "power3.inOut" },
          T
        );
        tl.to(
          "#ms-mask",
          { scaleX: 0, duration: duration, ease: "power3.inOut" },
          T
        );
        tl.to("#ms-out", { opacity: 0, duration: 0.01 }, T + duration);
        tl.to("#ms-mask", { opacity: 0, duration: 0.01 }, T + duration);

        window.__timelines["masked-slide-reveal"] = tl;
      })();
    </script>
  </div>
</template>
