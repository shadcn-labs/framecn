<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        gap: 40px;
        box-sizing: border-box;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 20px;
        flex: 1;
      }
      .grid-cell {
        background: #14141f;
        border-radius: 16px;
        border: 1px solid #27272a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 600;
        color: #52525b;
        opacity: 0;
        transform: scale(0.8);
      }
      .grid-cell:nth-child(1) {
        grid-column: span 2;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
      }
      .grid-cell:nth-child(4) {
        grid-row: span 2;
        background: linear-gradient(135deg, #1a1a2e, #0f3460);
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 60px;
        height: 3px;
        background: #818cf8;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="dynamic-grid"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Dynamic Grid</div>
        <div class="line"></div>
        <div class="grid">
          <div class="grid-cell" id="cell-1">Wide Card</div>
          <div class="grid-cell" id="cell-2">Card</div>
          <div class="grid-cell" id="cell-3">Card</div>
          <div class="grid-cell" id="cell-4">Tall Card</div>
          <div class="grid-cell" id="cell-5">Card</div>
          <div class="grid-cell" id="cell-6">Card</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var cells = [
        "#cell-1",
        "#cell-2",
        "#cell-3",
        "#cell-4",
        "#cell-5",
        "#cell-6",
      ];
      for (var i = 0; i < cells.length; i++) {
        tl.to(
          cells[i],
          { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.7)" },
          0.3 + i * 0.12
        );
      }

      window.__timelines["dynamic-grid"] = tl;
    </script>
  </body>
</html>
