<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toast Notification</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .toast {
        position: absolute;
        bottom: 80px;
        right: 80px;
        width: 480px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        padding: 20px 24px;
        display: flex;
        align-items: flex-start;
        gap: 16px;
        opacity: 0;
        transform: translateY(40px);
      }
      .toast-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #dcfce7;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .toast-icon svg {
        width: 20px;
        height: 20px;
        color: #22c55e;
      }
      .toast-content {
        flex: 1;
      }
      .toast-title {
        font-size: 18px;
        font-weight: 600;
        color: #171717;
        margin-bottom: 4px;
      }
      .toast-message {
        font-size: 14px;
        color: #71717a;
        line-height: 1.4;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #22c55e;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 60px;
        height: 3px;
        background: #22c55e;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="toast-notification"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Toast Notification</div>
        <div class="line"></div>
      </div>
      <div class="toast" id="toast">
        <div class="toast-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 13l4 4L19 7"
            ></path>
          </svg>
        </div>
        <div class="toast-content">
          <div class="toast-title">Deployment successful</div>
          <div class="toast-message">Your changes are live at framecn.dev</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#toast",
        {
          opacity: 1,
          y: 0,
          duration: 0.5,
          ease: "power3.out",
        },
        0.5
      );

      tl.to(
        "#toast",
        {
          opacity: 0,
          y: 20,
          duration: 0.4,
          ease: "power2.in",
        },
        5
      );

      window.__timelines["toast-notification"] = tl;
    </script>
  </body>
</html>
