<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Generate Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
        position: relative;
      }
      .ai-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 10, 15, 0.85);
        backdrop-filter: blur(8px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 32px;
        opacity: 0;
      }
      .ai-spinner {
        width: 80px;
        height: 80px;
        border: 4px solid #27272a;
        border-top-color: #6366f1;
        border-radius: 50%;
        opacity: 0;
      }
      .ai-prompt {
        font-size: 24px;
        color: #a1a1aa;
        text-align: center;
        max-width: 600px;
        opacity: 0;
      }
      .ai-progress {
        width: 400px;
        height: 6px;
        background: #27272a;
        border-radius: 3px;
        overflow: hidden;
        opacity: 0;
      }
      .ai-progress-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(to right, #6366f1, #818cf8);
        border-radius: 3px;
      }
      .ai-status {
        font-size: 18px;
        color: #818cf8;
        font-weight: 500;
        opacity: 0;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .main-title {
        font-size: 64px;
        font-weight: 800;
        color: #e2e2e8;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="ai-generate-overlay"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="10"
    >
      <div class="scene-content">
        <div class="tag">Background Content</div>
        <div class="main-title">Your App</div>
      </div>
      <div class="ai-overlay" id="ai-overlay">
        <div class="ai-spinner" id="ai-spinner"></div>
        <div class="ai-prompt" id="ai-prompt">
          "Create a modern dashboard with analytics"
        </div>
        <div class="ai-progress" id="ai-progress">
          <div class="ai-progress-fill" id="ai-progress-fill"></div>
        </div>
        <div class="ai-status" id="ai-status">Generating...</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to("#ai-overlay", { opacity: 1, duration: 0.5 }, 1);
      tl.to("#ai-spinner", { opacity: 1, duration: 0.3 }, 1.3);
      tl.to("#ai-prompt", { opacity: 1, duration: 0.4 }, 1.5);
      tl.to("#ai-progress", { opacity: 1, duration: 0.3 }, 1.8);
      tl.to(
        "#ai-progress-fill",
        { width: "100%", duration: 4, ease: "power1.inOut" },
        2
      );
      tl.to("#ai-status", { opacity: 1, duration: 0.3 }, 2);

      tl.to(
        "#ai-spinner",
        {
          rotation: 360,
          duration: 1,
          ease: "linear",
          repeat: 4,
        },
        1.3
      );

      window.__timelines["ai-generate-overlay"] = tl;
    </script>
  </body>
</html>
