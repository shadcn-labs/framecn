<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frosted Glass Wipe</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #scene1 {
        z-index: 1;
        background: #0a0a0f;
      }
      #scene2 {
        z-index: 2;
        background: #1a0f1a;
        opacity: 0;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 24px;
        box-sizing: border-box;
      }
      .s1-title {
        font-size: 120px;
        font-weight: 800;
        color: #e2e2e8;
        letter-spacing: -0.03em;
      }
      .s1-subtitle {
        font-size: 42px;
        font-weight: 400;
        color: #8a8a9a;
      }
      .s2-heading {
        font-size: 100px;
        font-weight: 800;
        color: #e879f9;
        letter-spacing: -0.02em;
      }
      .s2-text {
        font-size: 36px;
        font-weight: 300;
        color: #b09ab0;
      }
      .s2-tag {
        font-size: 20px;
        font-weight: 600;
        color: #a855f7;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.12;
        pointer-events: none;
      }
      .glow-pink {
        background: #a855f7;
        bottom: -200px;
        left: -100px;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #e879f9;
        border-radius: 2px;
      }
      .glass-panel {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="frosted-glass-wipe"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div id="scene1" class="scene">
        <div class="scene-content">
          <div class="s1-title">Original</div>
          <div class="s1-subtitle">Scene before frosted glass transition</div>
        </div>
      </div>
      <div id="scene2" class="scene">
        <div class="glow glow-pink"></div>
        <div class="scene-content">
          <div class="s2-tag">Glass Effect</div>
          <div class="line"></div>
          <div class="s2-heading">Frosted</div>
          <div class="s2-text">Blur-based glass wipe transition</div>
        </div>
      </div>
      <div class="glass-panel" id="glass"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var T = 3.5;
      var glassDuration = 0.8;

      tl.to("#glass", { opacity: 1, duration: 0.15, ease: "power2.out" }, T);
      tl.to(
        "#glass",
        {
          backdropFilter: "blur(30px)",
          webkitBackdropFilter: "blur(30px)",
          duration: glassDuration * 0.5,
          ease: "power2.inOut",
        },
        T + 0.15
      );

      tl.to("#scene2", { opacity: 1, duration: 0.01 }, T + glassDuration * 0.5);
      tl.fromTo(
        "#s2-tag",
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
        T + glassDuration * 0.55
      );
      tl.fromTo(
        ".line",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.35, ease: "power2.out" },
        T + glassDuration * 0.65
      );
      tl.fromTo(
        "#s2-heading",
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "expo.out" },
        T + glassDuration * 0.7
      );
      tl.fromTo(
        "#s2-text",
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
        T + glassDuration * 0.85
      );

      tl.to(
        "#glass",
        {
          backdropFilter: "blur(0px)",
          webkitBackdropFilter: "blur(0px)",
          duration: glassDuration * 0.3,
          ease: "power2.in",
        },
        T + glassDuration
      );

      tl.to("#scene1", { opacity: 0, duration: 0.01 }, T + glassDuration);
      tl.to("#glass", { opacity: 0, duration: 0.1 }, T + glassDuration * 1.2);

      window.__timelines["frosted-glass-wipe"] = tl;
    </script>
  </body>
</html>
