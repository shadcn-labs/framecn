<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinetic Type Mask</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
        position: relative;
      }
      .kinetic-word {
        font-size: 120px;
        font-weight: 900;
        color: #e2e2e8;
        overflow: hidden;
        display: inline-block;
      }
      .kinetic-word span {
        display: inline-block;
        transform: translateY(100%);
        opacity: 0;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #3b82f6;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #60a5fa;
        border-radius: 2px;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.1;
        background: #3b82f6;
        bottom: -200px;
        left: -100px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="kinetic-type-mask"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="glow"></div>
      <div class="scene-content">
        <div class="tag">Kinetic Type</div>
        <div class="line"></div>
        <div class="kinetic-word" id="word1">
          <span>K</span><span>I</span><span>N</span><span>E</span><span>T</span
          ><span>I</span><span>C</span>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var chars = document.querySelectorAll("#word1 span");
      tl.fromTo(
        chars,
        { y: "100%", opacity: 0, rotateX: -90, transformOrigin: "top center" },
        {
          y: "0%",
          opacity: 1,
          rotateX: 0,
          duration: 0.6,
          stagger: 0.08,
          ease: "power3.out",
        },
        0.3
      );

      window.__timelines["kinetic-type-mask"] = tl;
    </script>
  </body>
</html>
