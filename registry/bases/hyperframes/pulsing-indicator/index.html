<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulsing Indicator</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .pulse-container {
        position: relative;
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pulse-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #22c55e;
        position: relative;
        z-index: 2;
      }
      .pulse-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #22c55e;
        opacity: 0.7;
        z-index: 1;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #22c55e;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 60px;
        height: 3px;
        background: #22c55e;
        border-radius: 2px;
      }
      .status-text {
        font-size: 24px;
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="pulsing-indicator"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Live Status</div>
        <div class="line"></div>
        <div class="pulse-container">
          <div class="pulse-ring" id="pulse-ring"></div>
          <div class="pulse-dot" id="pulse-dot"></div>
        </div>
        <div class="status-text">System operational</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var cycleDuration = 2;
      var repeatCount = 3;

      tl.to(
        "#pulse-ring",
        {
          scale: 3,
          opacity: 0,
          duration: cycleDuration,
          ease: "power2.out",
          repeat: repeatCount,
        },
        0.3
      );

      tl.to(
        "#pulse-dot",
        {
          scale: 1.15,
          opacity: 0.7,
          duration: cycleDuration / 2,
          ease: "sine.inOut",
          yoyo: true,
          repeat: repeatCount * 2 + 1,
        },
        0.3
      );

      window.__timelines["pulsing-indicator"] = tl;
    </script>
  </body>
</html>
