<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spatial Push Transition</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        transform-style: preserve-3d;
        perspective: 2000px;
      }
      #scene1 {
        z-index: 1;
        background: #0a0a0f;
      }
      #scene2 {
        z-index: 2;
        background: #1a1a0f;
        opacity: 0;
        transform: translateZ(-800px) scale(0.7);
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 24px;
        box-sizing: border-box;
      }
      .s1-title {
        font-size: 120px;
        font-weight: 800;
        color: #e2e2e8;
        letter-spacing: -0.03em;
      }
      .s1-subtitle {
        font-size: 42px;
        font-weight: 400;
        color: #8a8a9a;
      }
      .s2-heading {
        font-size: 100px;
        font-weight: 800;
        color: #fbbf24;
        letter-spacing: -0.02em;
      }
      .s2-text {
        font-size: 36px;
        font-weight: 300;
        color: #b0a890;
      }
      .s2-tag {
        font-size: 20px;
        font-weight: 600;
        color: #d97706;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.12;
        pointer-events: none;
      }
      .glow-amber {
        background: #d97706;
        top: -150px;
        left: -100px;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #fbbf24;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="spatial-push"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div id="scene1" class="scene">
        <div class="scene-content">
          <div class="s1-title">Push Back</div>
          <div class="s1-subtitle">3D depth perspective transition</div>
        </div>
      </div>
      <div id="scene2" class="scene">
        <div class="glow glow-amber"></div>
        <div class="scene-content">
          <div class="s2-tag">Pushed Forward</div>
          <div class="line"></div>
          <div class="s2-heading">In Focus</div>
          <div class="s2-text">Spatial push with depth perspective</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var T = 3.5;
      var pushDuration = 0.7;

      tl.to(
        "#scene1",
        {
          z: -800,
          scale: 0.7,
          opacity: 0,
          duration: pushDuration,
          ease: "power3.in",
        },
        T
      );

      tl.to("#scene2", { opacity: 1, duration: 0.01 }, T + pushDuration * 0.3);
      tl.to(
        "#scene2",
        {
          z: 0,
          scale: 1,
          duration: pushDuration * 0.7,
          ease: "power3.out",
        },
        T + pushDuration * 0.3
      );

      tl.fromTo(
        "#s2-tag",
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.35, ease: "power2.out" },
        T + pushDuration * 0.6
      );
      tl.fromTo(
        ".line",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.3, ease: "power2.out" },
        T + pushDuration * 0.7
      );
      tl.fromTo(
        "#s2-heading",
        { y: 25, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.45, ease: "expo.out" },
        T + pushDuration * 0.75
      );
      tl.fromTo(
        "#s2-text",
        { y: 15, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.35, ease: "power2.out" },
        T + pushDuration + 0.05
      );

      window.__timelines["spatial-push"] = tl;
    </script>
  </body>
</html>
