<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Code Compilation</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .compile-steps {
        display: flex;
        gap: 24px;
        justify-content: center;
      }
      .compile-step {
        width: 200px;
        padding: 28px;
        background: #14141f;
        border-radius: 16px;
        border: 1px solid #27272a;
        text-align: center;
        opacity: 0;
        transform: translateY(20px);
      }
      .step-icon {
        font-size: 36px;
        margin-bottom: 12px;
      }
      .step-name {
        font-size: 16px;
        font-weight: 600;
        color: #e2e2e8;
        margin-bottom: 8px;
      }
      .step-status {
        font-size: 14px;
        color: #71717a;
      }
      .step-status.running {
        color: #fbbf24;
      }
      .step-status.done {
        color: #22c55e;
      }
      .step-progress {
        width: 100%;
        height: 4px;
        background: #27272a;
        border-radius: 2px;
        margin-top: 12px;
        overflow: hidden;
      }
      .step-progress-fill {
        height: 100%;
        width: 0;
        background: #22c55e;
        border-radius: 2px;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #22c55e;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .compile-output {
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        color: #71717a;
        text-align: center;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="live-code-compilation"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="10"
    >
      <div class="scene-content">
        <div class="tag">Build Pipeline</div>
        <div class="compile-steps">
          <div class="compile-step" id="step-parse">
            <div class="step-icon">📝</div>
            <div class="step-name">Parse</div>
            <div class="step-status" id="status-parse">Waiting</div>
            <div class="step-progress">
              <div class="step-progress-fill" id="prog-parse"></div>
            </div>
          </div>
          <div class="compile-step" id="step-transform">
            <div class="step-icon">⚙️</div>
            <div class="step-name">Transform</div>
            <div class="step-status" id="status-transform">Waiting</div>
            <div class="step-progress">
              <div class="step-progress-fill" id="prog-transform"></div>
            </div>
          </div>
          <div class="compile-step" id="step-bundle">
            <div class="step-icon">📦</div>
            <div class="step-name">Bundle</div>
            <div class="step-status" id="status-bundle">Waiting</div>
            <div class="step-progress">
              <div class="step-progress-fill" id="prog-bundle"></div>
            </div>
          </div>
          <div class="compile-step" id="step-optimize">
            <div class="step-icon">✨</div>
            <div class="step-name">Optimize</div>
            <div class="step-status" id="status-optimize">Waiting</div>
            <div class="step-progress">
              <div class="step-progress-fill" id="prog-optimize"></div>
            </div>
          </div>
        </div>
        <div class="compile-output" id="compile-output">
          ✓ Build complete in 3.2s — 12 modules, 48KB
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var steps = [
        "#step-parse",
        "#step-transform",
        "#step-bundle",
        "#step-optimize",
      ];
      for (var i = 0; i < steps.length; i++) {
        tl.to(
          steps[i],
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          0.3 + i * 0.1
        );
      }

      tl.call(
        function () {
          document.getElementById("status-parse").textContent = "Running...";
          document.getElementById("status-parse").className =
            "step-status running";
        },
        null,
        1
      );
      tl.to(
        "#prog-parse",
        { width: "100%", duration: 1, ease: "power2.out" },
        1
      );
      tl.call(
        function () {
          document.getElementById("status-parse").textContent = "Done";
          document.getElementById("status-parse").className =
            "step-status done";
        },
        null,
        2
      );

      tl.call(
        function () {
          document.getElementById("status-transform").textContent =
            "Running...";
          document.getElementById("status-transform").className =
            "step-status running";
        },
        null,
        2.3
      );
      tl.to(
        "#prog-transform",
        { width: "100%", duration: 1.2, ease: "power2.out" },
        2.3
      );
      tl.call(
        function () {
          document.getElementById("status-transform").textContent = "Done";
          document.getElementById("status-transform").className =
            "step-status done";
        },
        null,
        3.5
      );

      tl.call(
        function () {
          document.getElementById("status-bundle").textContent = "Running...";
          document.getElementById("status-bundle").className =
            "step-status running";
        },
        null,
        3.8
      );
      tl.to(
        "#prog-bundle",
        { width: "100%", duration: 0.8, ease: "power2.out" },
        3.8
      );
      tl.call(
        function () {
          document.getElementById("status-bundle").textContent = "Done";
          document.getElementById("status-bundle").className =
            "step-status done";
        },
        null,
        4.6
      );

      tl.call(
        function () {
          document.getElementById("status-optimize").textContent = "Running...";
          document.getElementById("status-optimize").className =
            "step-status running";
        },
        null,
        4.9
      );
      tl.to(
        "#prog-optimize",
        { width: "100%", duration: 0.6, ease: "power2.out" },
        4.9
      );
      tl.call(
        function () {
          document.getElementById("status-optimize").textContent = "Done";
          document.getElementById("status-optimize").className =
            "step-status done";
        },
        null,
        5.5
      );

      tl.to("#compile-output", { opacity: 1, duration: 0.4 }, 5.8);

      window.__timelines["live-code-compilation"] = tl;
    </script>
  </body>
</html>
