<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracking In Effect</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .tracking-text {
        font-size: 100px;
        font-weight: 800;
        color: #e2e2e8;
        letter-spacing: 0.5em;
        opacity: 0;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #7c5cbf;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #a78bfa;
        border-radius: 2px;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.1;
        background: #7c5cbf;
        top: -200px;
        right: -100px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="tracking-in"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="glow"></div>
      <div class="scene-content">
        <div class="tag">Tracking In</div>
        <div class="line"></div>
        <div class="tracking-text" id="tracking-text">ELEGANCE</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.fromTo(
        "#tracking-text",
        { letterSpacing: "0.8em", opacity: 0 },
        {
          letterSpacing: "0.05em",
          opacity: 1,
          duration: 1.2,
          ease: "power3.out",
        },
        0.3
      );

      window.__timelines["tracking-in"] = tl;
    </script>
  </body>
</html>
