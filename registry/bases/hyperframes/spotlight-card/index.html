<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotlight Card</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .spotlight-card {
        position: relative;
        width: 500px;
        height: 320px;
        background: #14141f;
        border-radius: 20px;
        border: 1px solid #27272a;
        overflow: hidden;
        opacity: 0;
        transform: translateY(30px);
      }
      .spotlight-glow {
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.3) 0%,
          transparent 70%
        );
        pointer-events: none;
        top: -100px;
        left: -100px;
      }
      .card-content {
        position: relative;
        z-index: 10;
        padding: 32px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }
      .card-title {
        font-size: 32px;
        font-weight: 700;
        color: #e2e2e8;
        margin-bottom: 8px;
      }
      .card-desc {
        font-size: 18px;
        color: #71717a;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="spotlight-card"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Spotlight Effect</div>
        <div class="spotlight-card" id="spotlight-card">
          <div class="spotlight-glow" id="spotlight-glow"></div>
          <div class="card-content">
            <div class="card-title">Spotlight Card</div>
            <div class="card-desc">Glow follows cursor position</div>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#spotlight-card",
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
        0.3
      );

      tl.to(
        "#spotlight-glow",
        {
          left: 200,
          top: 50,
          duration: 2,
          ease: "sine.inOut",
          repeat: 2,
          yoyo: true,
        },
        1
      );

      window.__timelines["spotlight-card"] = tl;
    </script>
  </body>
</html>
