<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat to Preview Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        gap: 40px;
        box-sizing: border-box;
      }
      .chat-panel {
        width: 480px;
        background: #14141f;
        border-radius: 20px;
        border: 1px solid #27272a;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        opacity: 0;
        transform: translateX(-40px);
      }
      .chat-msg {
        padding: 16px 20px;
        border-radius: 16px;
        font-size: 16px;
        line-height: 1.5;
      }
      .chat-msg.user {
        background: #6366f1;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }
      .chat-msg.ai {
        background: #27272a;
        color: #e2e2e8;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }
      .preview-panel {
        flex: 1;
        background: #14141f;
        border-radius: 20px;
        border: 1px solid #27272a;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #52525b;
        font-size: 24px;
        opacity: 0;
        transform: translateX(40px);
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="chat-to-preview-layout"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="chat-panel" id="chat-panel">
          <div class="tag">Chat Interface</div>
          <div class="chat-msg user">
            Create a landing page for my SaaS product
          </div>
          <div class="chat-msg ai">
            I'll generate a modern landing page with hero, features, and pricing
            sections.
          </div>
        </div>
        <div class="preview-panel" id="preview-panel">Preview Panel</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#chat-panel",
        { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" },
        0.3
      );
      tl.to(
        "#preview-panel",
        { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" },
        0.6
      );

      window.__timelines["chat-to-preview-layout"] = tl;
    </script>
  </body>
</html>
