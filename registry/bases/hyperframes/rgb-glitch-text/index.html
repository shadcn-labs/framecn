<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RGB Glitch Text</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
        position: relative;
      }
      .glitch-container {
        position: relative;
        display: inline-block;
      }
      .glitch-text {
        font-size: 120px;
        font-weight: 900;
        color: #e2e2e8;
        letter-spacing: -0.03em;
      }
      .glitch-layer {
        position: absolute;
        top: 0;
        left: 0;
        font-size: 120px;
        font-weight: 900;
        letter-spacing: -0.03em;
        pointer-events: none;
      }
      .glitch-red {
        color: #ff0000;
        opacity: 0;
        mix-blend-mode: screen;
      }
      .glitch-blue {
        color: #0000ff;
        opacity: 0;
        mix-blend-mode: screen;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #ef4444;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #f87171;
        border-radius: 2px;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.08;
        background: #ef4444;
        bottom: -200px;
        right: -100px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="rgb-glitch-text"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="glow"></div>
      <div class="scene-content">
        <div class="tag">RGB Glitch</div>
        <div class="line"></div>
        <div class="glitch-container">
          <div class="glitch-text">GLITCH</div>
          <div class="glitch-layer glitch-red" id="glitch-red">GLITCH</div>
          <div class="glitch-layer glitch-blue" id="glitch-blue">GLITCH</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var glitchStart = 1;
      var glitchEnd = 4;
      var glitchCount = 6;
      var interval = (glitchEnd - glitchStart) / glitchCount;

      for (var i = 0; i < glitchCount; i++) {
        var t = glitchStart + i * interval;
        var offsetX = (Math.random() > 0.5 ? 1 : -1) * (5 + Math.random() * 15);
        var offsetY = (Math.random() - 0.5) * 8;

        tl.to(
          "#glitch-red",
          { opacity: 0.7, x: offsetX, y: offsetY, duration: 0.02 },
          t
        );
        tl.to(
          "#glitch-blue",
          { opacity: 0.7, x: -offsetX * 0.7, y: -offsetY, duration: 0.02 },
          t
        );
        tl.to(
          "#glitch-red",
          { opacity: 0, x: 0, y: 0, duration: 0.08 },
          t + 0.05
        );
        tl.to(
          "#glitch-blue",
          { opacity: 0, x: 0, y: 0, duration: 0.08 },
          t + 0.05
        );
      }

      window.__timelines["rgb-glitch-text"] = tl;
    </script>
  </body>
</html>
