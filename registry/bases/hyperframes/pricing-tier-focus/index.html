<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Tier Focus</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .pricing-grid {
        display: flex;
        gap: 24px;
        justify-content: center;
      }
      .pricing-card {
        width: 320px;
        background: #14141f;
        border-radius: 20px;
        border: 1px solid #27272a;
        padding: 36px;
        opacity: 0;
        transform: translateY(30px);
      }
      .pricing-card.featured {
        border-color: #6366f1;
        background: linear-gradient(135deg, #1a1a2e, #14141f);
        transform: translateY(30px) scale(0.95);
      }
      .pricing-name {
        font-size: 20px;
        font-weight: 600;
        color: #a1a1aa;
        margin-bottom: 8px;
      }
      .pricing-price {
        font-size: 56px;
        font-weight: 800;
        color: #e2e2e8;
        margin-bottom: 24px;
      }
      .pricing-price span {
        font-size: 20px;
        font-weight: 400;
        color: #71717a;
      }
      .pricing-features {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .pricing-feature {
        font-size: 16px;
        color: #a1a1aa;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="pricing-tier-focus"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Pricing Tiers</div>
        <div class="pricing-grid">
          <div class="pricing-card" id="price-1">
            <div class="pricing-name">Starter</div>
            <div class="pricing-price">$9<span>/mo</span></div>
            <div class="pricing-features">
              <div class="pricing-feature">5 projects</div>
              <div class="pricing-feature">Basic analytics</div>
              <div class="pricing-feature">Email support</div>
            </div>
          </div>
          <div class="pricing-card featured" id="price-2">
            <div class="pricing-name">Pro</div>
            <div class="pricing-price">$29<span>/mo</span></div>
            <div class="pricing-features">
              <div class="pricing-feature">Unlimited projects</div>
              <div class="pricing-feature">Advanced analytics</div>
              <div class="pricing-feature">Priority support</div>
            </div>
          </div>
          <div class="pricing-card" id="price-3">
            <div class="pricing-name">Enterprise</div>
            <div class="pricing-price">$99<span>/mo</span></div>
            <div class="pricing-features">
              <div class="pricing-feature">Everything in Pro</div>
              <div class="pricing-feature">Custom integrations</div>
              <div class="pricing-feature">Dedicated manager</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#price-1",
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
        0.3
      );
      tl.to(
        "#price-2",
        { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "back.out(1.7)" },
        0.5
      );
      tl.to(
        "#price-3",
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
        0.7
      );

      window.__timelines["pricing-tier-focus"] = tl;
    </script>
  </body>
</html>
