<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glass Code Block</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .glass-code {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 32px;
        max-width: 800px;
        width: 100%;
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      .code-lang {
        font-size: 14px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 16px;
      }
      .code-content {
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        line-height: 1.8;
        color: #e2e2e8;
      }
      .code-keyword {
        color: #c084fc;
      }
      .code-string {
        color: #34d399;
      }
      .code-func {
        color: #60a5fa;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="glass-code-block"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="scene-content">
        <div class="tag">Glass Code Block</div>
        <div class="glass-code" id="glass-code">
          <div class="code-lang">TypeScript</div>
          <div class="code-content">
            <span class="code-keyword">const</span> app =
            <span class="code-func">createApp</span>({<br />
            &nbsp;&nbsp;name: <span class="code-string">"framecn"</span>,<br />
            &nbsp;&nbsp;version: <span class="code-string">"2.0.0"</span><br />
            });
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#glass-code",
        { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "power3.out" },
        0.3
      );

      window.__timelines["glass-code-block"] = tl;
    </script>
  </body>
</html>
