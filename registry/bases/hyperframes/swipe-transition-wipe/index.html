<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swipe Transition Wipe</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #scene1 {
        z-index: 1;
        background: #0a0a0f;
      }
      #scene2 {
        z-index: 2;
        background: #0f1a1a;
        opacity: 0;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 24px;
        box-sizing: border-box;
      }
      .s1-title {
        font-size: 120px;
        font-weight: 800;
        color: #e2e2e8;
        letter-spacing: -0.03em;
      }
      .s1-subtitle {
        font-size: 42px;
        font-weight: 400;
        color: #8a8a9a;
      }
      .s2-heading {
        font-size: 100px;
        font-weight: 800;
        color: #2dd4bf;
        letter-spacing: -0.02em;
      }
      .s2-text {
        font-size: 36px;
        font-weight: 300;
        color: #90b0b0;
      }
      .s2-tag {
        font-size: 20px;
        font-weight: 600;
        color: #14b8a6;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.12;
        pointer-events: none;
      }
      .glow-teal {
        background: #14b8a6;
        top: -200px;
        right: -100px;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #2dd4bf;
        border-radius: 2px;
      }
      .swipe-trail {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        pointer-events: none;
      }
      .swipe-band {
        position: absolute;
        top: 0;
        left: -200px;
        width: 200px;
        height: 100%;
        background: linear-gradient(
          to right,
          transparent,
          rgba(45, 212, 191, 0.15),
          transparent
        );
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="swipe-transition-wipe"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div id="scene1" class="scene">
        <div class="scene-content">
          <div class="s1-title">Swipe Away</div>
          <div class="s1-subtitle">Touch gesture style wipe</div>
        </div>
      </div>
      <div id="scene2" class="scene">
        <div class="glow glow-teal"></div>
        <div class="scene-content">
          <div class="s2-tag">Swiped In</div>
          <div class="line"></div>
          <div class="s2-heading">New Content</div>
          <div class="s2-text">Swipe gesture transition effect</div>
        </div>
      </div>
      <div class="swipe-trail">
        <div class="swipe-band" id="swipe-band"></div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var T = 3.5;
      var swipeDuration = 0.5;

      tl.to(
        "#scene1",
        {
          x: -1920,
          duration: swipeDuration,
          ease: "power3.in",
        },
        T
      );

      tl.to("#scene2", { opacity: 1, duration: 0.01 }, T);
      tl.to(
        "#scene2",
        {
          x: 0,
          duration: 0.01,
        },
        T
      );
      tl.fromTo(
        "#scene2",
        { x: 1920 },
        { x: 0, duration: swipeDuration, ease: "power3.out" },
        T
      );

      tl.to("#swipe-band", { opacity: 1, duration: 0.05 }, T);
      tl.to(
        "#swipe-band",
        {
          left: "1920px",
          duration: swipeDuration * 0.8,
          ease: "power2.in",
        },
        T
      );
      tl.to(
        "#swipe-band",
        { opacity: 0, duration: 0.1 },
        T + swipeDuration * 0.7
      );

      tl.fromTo(
        "#s2-tag",
        { x: -20, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" },
        T + 0.15
      );
      tl.fromTo(
        ".line",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.3, ease: "power2.out" },
        T + 0.25
      );
      tl.fromTo(
        "#s2-heading",
        { x: -25, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.45, ease: "expo.out" },
        T + 0.3
      );
      tl.fromTo(
        "#s2-text",
        { x: -20, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" },
        T + 0.4
      );

      window.__timelines["swipe-transition-wipe"] = tl;
    </script>
  </body>
</html>
