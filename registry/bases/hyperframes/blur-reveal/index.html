<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blur Reveal</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #scene1 {
        z-index: 1;
        background: #0a0a0f;
      }
      #scene2 {
        z-index: 2;
        background: #1a1a0f;
        opacity: 0;
        filter: blur(25px);
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 24px;
        box-sizing: border-box;
      }
      .s1-title {
        font-size: 120px;
        font-weight: 800;
        color: #e2e2e8;
        letter-spacing: -0.03em;
      }
      .s1-subtitle {
        font-size: 42px;
        font-weight: 400;
        color: #8a8a9a;
      }
      .s2-heading {
        font-size: 100px;
        font-weight: 800;
        color: #fbbf24;
        letter-spacing: -0.02em;
      }
      .s2-text {
        font-size: 36px;
        font-weight: 300;
        color: #b0a890;
      }
      .s2-tag {
        font-size: 20px;
        font-weight: 600;
        color: #d97706;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.12;
        pointer-events: none;
      }
      .glow-amber {
        background: #d97706;
        bottom: -200px;
        right: -100px;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #fbbf24;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="blur-reveal"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div id="scene1" class="scene">
        <div class="scene-content">
          <div class="s1-title">Blurred</div>
          <div class="s1-subtitle">
            Content fades out before blur transition
          </div>
        </div>
      </div>
      <div id="scene2" class="scene">
        <div class="glow glow-amber"></div>
        <div class="scene-content">
          <div class="s2-tag">Focus Pull</div>
          <div class="line"></div>
          <div class="s2-heading">Sharp</div>
          <div class="s2-text">Progressive blur-to-sharp reveal</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var T = 3.5;
      var blurDuration = 0.8;

      tl.to("#scene2", { opacity: 1, duration: 0.01 }, T);
      tl.to(
        "#scene2",
        {
          filter: "blur(0px)",
          duration: blurDuration,
          ease: "power2.inOut",
        },
        T
      );

      tl.fromTo(
        "#s2-tag",
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
        T + 0.2
      );
      tl.fromTo(
        ".line",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.35, ease: "power2.out" },
        T + 0.3
      );
      tl.fromTo(
        "#s2-heading",
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "expo.out" },
        T + 0.35
      );
      tl.fromTo(
        "#s2-text",
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
        T + 0.5
      );

      tl.to(
        "#scene1",
        { opacity: 0, duration: blurDuration * 0.6, ease: "power2.in" },
        T
      );

      window.__timelines["blur-reveal"] = tl;
    </script>
  </body>
</html>
