<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal to Browser Deploy</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 60px;
        box-sizing: border-box;
      }
      .terminal-panel {
        width: 500px;
        background: #14141f;
        border-radius: 16px;
        border: 1px solid #27272a;
        overflow: hidden;
        opacity: 0;
        transform: translateX(-40px);
      }
      .terminal-header {
        background: #1e1e2e;
        padding: 14px 20px;
        display: flex;
        gap: 10px;
      }
      .t-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
      }
      .t-dot.r {
        background: #ef4444;
      }
      .t-dot.y {
        background: #fbbf24;
      }
      .t-dot.g {
        background: #22c55e;
      }
      .terminal-body {
        padding: 24px;
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        line-height: 2;
      }
      .t-line {
        opacity: 0;
      }
      .t-prompt {
        color: #22c55e;
      }
      .t-cmd {
        color: #e2e2e8;
      }
      .t-ok {
        color: #22c55e;
      }
      .browser-panel {
        width: 600px;
        background: #14141f;
        border-radius: 16px;
        border: 1px solid #27272a;
        overflow: hidden;
        opacity: 0;
        transform: translateX(40px);
      }
      .browser-bar {
        background: #1e1e2e;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .browser-url {
        flex: 1;
        background: #27272a;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 14px;
        color: #71717a;
        font-family: "JetBrains Mono", monospace;
      }
      .browser-body {
        height: 300px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
        font-weight: 600;
      }
      .arrow-connector {
        font-size: 48px;
        color: #6366f1;
        opacity: 0;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        position: absolute;
        top: 120px;
        left: 160px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="terminal-to-browser-deploy"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="10"
    >
      <div class="tag">Deploy Flow</div>
      <div class="scene-content">
        <div class="terminal-panel" id="term-panel">
          <div class="terminal-header">
            <div class="t-dot r"></div>
            <div class="t-dot y"></div>
            <div class="t-dot g"></div>
          </div>
          <div class="terminal-body">
            <div class="t-line" id="tl-1">
              <span class="t-prompt">$ </span
              ><span class="t-cmd">npx framecn deploy</span>
            </div>
            <div class="t-line" id="tl-2">
              <span class="t-ok">✓ Build complete</span>
            </div>
            <div class="t-line" id="tl-3">
              <span class="t-ok">✓ Uploaded 12 files</span>
            </div>
            <div class="t-line" id="tl-4">
              <span class="t-ok">✓ Live at framecn.dev</span>
            </div>
          </div>
        </div>
        <div class="arrow-connector" id="arrow">→</div>
        <div class="browser-panel" id="browser-panel">
          <div class="browser-bar">
            <div class="browser-url">https://framecn.dev</div>
          </div>
          <div class="browser-body">🚀 Live!</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#term-panel",
        { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" },
        0.3
      );
      var lines = ["#tl-1", "#tl-2", "#tl-3", "#tl-4"];
      for (var i = 0; i < lines.length; i++) {
        tl.to(lines[i], { opacity: 1, duration: 0.3 }, 0.8 + i * 0.6);
      }
      tl.to("#arrow", { opacity: 1, duration: 0.3 }, 3.2);
      tl.to(
        "#browser-panel",
        { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" },
        3.5
      );

      window.__timelines["terminal-to-browser-deploy"] = tl;
    </script>
  </body>
</html>
