<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
        position: relative;
      }
      .browser-window {
        width: 900px;
        background: #14141f;
        border-radius: 16px;
        border: 1px solid #27272a;
        overflow: hidden;
        opacity: 0;
        transform: translateY(30px);
      }
      .browser-bar {
        background: #1e1e2e;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .b-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
      }
      .b-dot.r {
        background: #ef4444;
      }
      .b-dot.y {
        background: #fbbf24;
      }
      .b-dot.g {
        background: #22c55e;
      }
      .browser-url {
        flex: 1;
        background: #27272a;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 14px;
        color: #71717a;
        font-family: "JetBrains Mono", monospace;
      }
      .browser-body {
        height: 450px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 600;
        color: #52525b;
        transition: background 0.5s;
      }
      .browser-body.page-1 {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
      }
      .browser-body.page-2 {
        background: linear-gradient(135deg, #16213e, #0f3460);
      }
      .browser-body.page-3 {
        background: linear-gradient(135deg, #0f3460, #533483);
      }
      .nav-dots {
        display: flex;
        gap: 12px;
      }
      .nav-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #27272a;
        opacity: 0;
      }
      .nav-dot.active {
        background: #6366f1;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="browser-flow"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="10"
    >
      <div class="scene-content">
        <div class="tag">Browser Navigation</div>
        <div class="browser-window" id="browser-window">
          <div class="browser-bar">
            <div class="b-dot r"></div>
            <div class="b-dot y"></div>
            <div class="b-dot g"></div>
            <div class="browser-url" id="browser-url">framecn.dev/home</div>
          </div>
          <div class="browser-body page-1" id="browser-body">Home Page</div>
        </div>
        <div class="nav-dots">
          <div class="nav-dot" id="nd-1"></div>
          <div class="nav-dot" id="nd-2"></div>
          <div class="nav-dot" id="nd-3"></div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#browser-window",
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
        0.3
      );

      tl.to("#nd-1", { opacity: 1, duration: 0.2 }, 0.8);
      tl.call(
        function () {
          document.getElementById("nd-1").className = "nav-dot active";
        },
        null,
        0.8
      );

      tl.to("#browser-body", { opacity: 0, duration: 0.2 }, 2.5);
      tl.call(
        function () {
          document.getElementById("browser-body").className =
            "browser-body page-2";
          document.getElementById("browser-body").textContent = "Features Page";
          document.getElementById("browser-url").textContent =
            "framecn.dev/features";
        },
        null,
        2.7
      );
      tl.to("#browser-body", { opacity: 1, duration: 0.3 }, 2.7);
      tl.to("#nd-2", { opacity: 1, duration: 0.2 }, 2.7);
      tl.call(
        function () {
          document.getElementById("nd-2").className = "nav-dot active";
        },
        null,
        2.7
      );

      tl.to("#browser-body", { opacity: 0, duration: 0.2 }, 5);
      tl.call(
        function () {
          document.getElementById("browser-body").className =
            "browser-body page-3";
          document.getElementById("browser-body").textContent = "Pricing Page";
          document.getElementById("browser-url").textContent =
            "framecn.dev/pricing";
        },
        null,
        5.2
      );
      tl.to("#browser-body", { opacity: 1, duration: 0.3 }, 5.2);
      tl.to("#nd-3", { opacity: 1, duration: 0.2 }, 5.2);
      tl.call(
        function () {
          document.getElementById("nd-3").className = "nav-dot active";
        },
        null,
        5.2
      );

      window.__timelines["browser-flow"] = tl;
    </script>
  </body>
</html>
