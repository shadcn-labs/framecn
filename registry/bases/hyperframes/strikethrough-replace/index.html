<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strikethrough Replace</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .replace-container {
        display: flex;
        align-items: center;
        gap: 24px;
        font-size: 80px;
        font-weight: 700;
      }
      .old-text-wrap {
        position: relative;
        display: inline-block;
      }
      .old-text {
        color: #a1a1aa;
      }
      .strike-line {
        position: absolute;
        top: 50%;
        left: -4px;
        height: 4px;
        background: #ef4444;
        transform: translateY(-50%) scaleX(0);
        transform-origin: left center;
        border-radius: 2px;
        width: calc(100% + 8px);
      }
      .arrow {
        color: #71717a;
        font-size: 48px;
      }
      .new-text {
        color: #22c55e;
        opacity: 0;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #71717a;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 60px;
        height: 3px;
        background: #a1a1aa;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="strikethrough-replace"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="scene-content">
        <div class="tag">Strikethrough Replace</div>
        <div class="line"></div>
        <div class="replace-container">
          <span class="old-text-wrap">
            <span class="old-text" id="old-text">Good</span>
            <span class="strike-line" id="strike-line"></span>
          </span>
          <span class="arrow">→</span>
          <span class="new-text" id="new-text">Great</span>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#strike-line",
        {
          scaleX: 1,
          duration: 0.4,
          ease: "power2.out",
        },
        0.5
      );

      tl.to(
        "#new-text",
        { opacity: 1, duration: 0.4, ease: "power2.out" },
        1.0
      );

      window.__timelines["strikethrough-replace"] = tl;
    </script>
  </body>
</html>
