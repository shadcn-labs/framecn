<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Generation Canvas</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .canvas-frame {
        width: 600px;
        height: 400px;
        background: #14141f;
        border-radius: 16px;
        border: 1px solid #27272a;
        overflow: hidden;
        position: relative;
        opacity: 0;
      }
      .canvas-stage {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .canvas-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
      }
      .layer-sketch {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      }
      .layer-color {
        background: linear-gradient(
          135deg,
          #6366f1 0%,
          #8b5cf6 50%,
          #a78bfa 100%
        );
      }
      .layer-refine {
        background: linear-gradient(
          135deg,
          #6366f1 0%,
          #8b5cf6 30%,
          #ec4899 70%,
          #fbbf24 100%
        );
      }
      .stage-label {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        opacity: 0;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="ai-generation-canvas"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="10"
    >
      <div class="scene-content">
        <div class="tag">AI Generation</div>
        <div class="canvas-frame" id="canvas-frame">
          <div class="canvas-stage">
            <div class="canvas-layer layer-sketch" id="layer-sketch"></div>
            <div class="canvas-layer layer-color" id="layer-color"></div>
            <div class="canvas-layer layer-refine" id="layer-refine"></div>
          </div>
          <div class="stage-label" id="stage-label">Stage 1: Sketch</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to("#canvas-frame", { opacity: 1, duration: 0.5 }, 0.3);

      tl.to("#layer-sketch", { opacity: 1, duration: 0.8 }, 0.6);
      tl.to("#stage-label", { opacity: 1, duration: 0.3 }, 0.6);
      tl.call(
        function () {
          document.getElementById("stage-label").textContent =
            "Stage 1: Sketch";
        },
        null,
        0.6
      );

      tl.to("#stage-label", { opacity: 0, duration: 0.2 }, 2.5);
      tl.to("#layer-color", { opacity: 1, duration: 1 }, 2.8);
      tl.call(
        function () {
          document.getElementById("stage-label").textContent = "Stage 2: Color";
        },
        null,
        2.8
      );
      tl.to("#stage-label", { opacity: 1, duration: 0.3 }, 2.8);

      tl.to("#stage-label", { opacity: 0, duration: 0.2 }, 5);
      tl.to("#layer-refine", { opacity: 1, duration: 1.2 }, 5.3);
      tl.call(
        function () {
          document.getElementById("stage-label").textContent =
            "Stage 3: Refine";
        },
        null,
        5.3
      );
      tl.to("#stage-label", { opacity: 1, duration: 0.3 }, 5.3);

      window.__timelines["ai-generation-canvas"] = tl;
    </script>
  </body>
</html>
