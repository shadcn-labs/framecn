<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Device Assemble</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
        position: relative;
      }
      .device-stack {
        position: relative;
        width: 400px;
        height: 500px;
      }
      .device-layer {
        position: absolute;
        width: 100%;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 600;
        color: white;
      }
      .device-back {
        height: 400px;
        background: linear-gradient(135deg, #1e1e2e, #2d2d44);
        border: 2px solid #3f3f46;
        top: 50px;
        opacity: 0;
        transform: translateY(100px) rotateX(20deg);
      }
      .device-mid {
        height: 350px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        top: 75px;
        left: 25px;
        width: calc(100% - 50px);
        opacity: 0;
        transform: translateY(80px) rotateX(15deg);
      }
      .device-front {
        height: 300px;
        background: linear-gradient(135deg, #818cf8, #a78bfa);
        top: 100px;
        left: 50px;
        width: calc(100% - 100px);
        opacity: 0;
        transform: translateY(60px) rotateX(10deg);
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="hero-device-assemble"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Device Assembly</div>
        <div class="device-stack">
          <div class="device-layer device-back" id="dev-back">Hardware</div>
          <div class="device-layer device-mid" id="dev-mid">OS Layer</div>
          <div class="device-layer device-front" id="dev-front">Your App</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#dev-back",
        { opacity: 1, y: 0, rotateX: 0, duration: 0.8, ease: "power3.out" },
        0.3
      );
      tl.to(
        "#dev-mid",
        { opacity: 1, y: 0, rotateX: 0, duration: 0.7, ease: "power3.out" },
        0.8
      );
      tl.to(
        "#dev-front",
        { opacity: 1, y: 0, rotateX: 0, duration: 0.6, ease: "power3.out" },
        1.3
      );

      window.__timelines["hero-device-assemble"] = tl;
    </script>
  </body>
</html>
