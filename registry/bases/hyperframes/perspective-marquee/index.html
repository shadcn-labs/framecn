<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perspective Marquee</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 48px;
        box-sizing: border-box;
        overflow: hidden;
        perspective: 800px;
      }
      .persp-track {
        display: flex;
        gap: 48px;
        white-space: nowrap;
        transform: rotateX(15deg) rotateY(-5deg);
        transform-origin: center center;
      }
      .persp-item {
        font-size: 64px;
        font-weight: 800;
        color: #27272a;
        flex-shrink: 0;
      }
      .persp-item.accent {
        color: #6366f1;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        padding: 0 80px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="perspective-marquee"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="12"
    >
      <div class="scene-content">
        <div class="tag">3D Perspective Marquee</div>
        <div class="persp-track" id="persp-track">
          <span class="persp-item">DESIGN</span>
          <span class="persp-item accent">•</span>
          <span class="persp-item">BUILD</span>
          <span class="persp-item accent">•</span>
          <span class="persp-item">SHIP</span>
          <span class="persp-item accent">•</span>
          <span class="persp-item">SCALE</span>
          <span class="persp-item accent">•</span>
          <span class="persp-item">ITERATE</span>
          <span class="persp-item accent">•</span>
        </div>
        <div class="persp-track" id="persp-track-2">
          <span class="persp-item accent">COMPONENTS</span>
          <span class="persp-item">•</span>
          <span class="persp-item accent">TRANSITIONS</span>
          <span class="persp-item">•</span>
          <span class="persp-item accent">ANIMATIONS</span>
          <span class="persp-item">•</span>
          <span class="persp-item accent">EFFECTS</span>
          <span class="persp-item">•</span>
          <span class="persp-item accent">GRIDS</span>
          <span class="persp-item">•</span>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var t1 = document.getElementById("persp-track");
      var t2 = document.getElementById("persp-track-2");
      t1.innerHTML = t1.innerHTML + t1.innerHTML;
      t2.innerHTML = t2.innerHTML + t2.innerHTML;

      var w1 = t1.scrollWidth / 2;
      var w2 = t2.scrollWidth / 2;

      tl.to(
        "#persp-track",
        { x: -w1, duration: 10, ease: "none", repeat: 1 },
        0
      );
      tl.to(
        "#persp-track-2",
        { x: -w2, duration: 12, ease: "none", repeat: 1 },
        0
      );

      window.__timelines["perspective-marquee"] = tl;
    </script>
  </body>
</html>
