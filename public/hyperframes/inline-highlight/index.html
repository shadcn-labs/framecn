<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inline Highlight</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .highlight-sentence {
        font-size: 64px;
        font-weight: 400;
        color: #404040;
        line-height: 1.4;
      }
      .highlight-wrap {
        position: relative;
        display: inline;
      }
      .highlight-bar {
        position: absolute;
        top: -4px;
        left: -8px;
        right: -8px;
        bottom: -4px;
        background: #fbbf24;
        opacity: 0.4;
        transform: scaleX(0);
        transform-origin: left center;
        border-radius: 4px;
        z-index: 0;
      }
      .highlight-text {
        position: relative;
        z-index: 1;
        color: #171717;
        font-weight: 600;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #d97706;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 60px;
        height: 3px;
        background: #fbbf24;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="inline-highlight"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="scene-content">
        <div class="tag">Inline Highlight</div>
        <div class="line"></div>
        <div class="highlight-sentence">
          The
          <span class="highlight-wrap"
            ><span class="highlight-bar" id="hl-1"></span
            ><span class="highlight-text">key insight</span></span
          >
          is that design is not just how it looks but
          <span class="highlight-wrap"
            ><span class="highlight-bar" id="hl-2"></span
            ><span class="highlight-text">how it works</span></span
          >.
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to("#hl-1", { scaleX: 1, duration: 0.5, ease: "power2.out" }, 0.5);
      tl.to("#hl-2", { scaleX: 1, duration: 0.5, ease: "power2.out" }, 1.2);

      window.__timelines["inline-highlight"] = tl;
    </script>
  </body>
</html>
