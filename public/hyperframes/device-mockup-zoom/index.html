<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Device Mockup Zoom</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .device-frame {
        width: 300px;
        height: 600px;
        background: #1e1e2e;
        border-radius: 40px;
        border: 4px solid #3f3f46;
        padding: 12px;
        position: relative;
        opacity: 0;
        transform: scale(0.6);
      }
      .device-notch {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 28px;
        background: #1e1e2e;
        border-radius: 0 0 16px 16px;
        z-index: 10;
      }
      .device-screen {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 24px;
        font-weight: 600;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="device-mockup-zoom"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Device Mockup</div>
        <div class="device-frame" id="device">
          <div class="device-notch"></div>
          <div class="device-screen">Your App</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#device",
        { opacity: 1, scale: 1, duration: 0.8, ease: "power3.out" },
        0.3
      );
      tl.to("#device", { scale: 1.3, duration: 1.5, ease: "power2.inOut" }, 2);
      tl.to("#device", { scale: 1, duration: 1, ease: "power2.inOut" }, 3.5);

      window.__timelines["device-mockup-zoom"] = tl;
    </script>
  </body>
</html>
