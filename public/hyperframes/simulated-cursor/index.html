<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulated Cursor</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
        position: relative;
      }
      .cursor {
        position: absolute;
        width: 24px;
        height: 24px;
        pointer-events: none;
        z-index: 100;
        opacity: 0;
      }
      .cursor svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
      }
      .cursor-click {
        position: absolute;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid #6366f1;
        opacity: 0;
        pointer-events: none;
        z-index: 99;
      }
      .demo-button {
        width: 200px;
        height: 56px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        margin-left: 200px;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #6366f1;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 60px;
        height: 3px;
        background: #6366f1;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="simulated-cursor"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Cursor Demo</div>
        <div class="line"></div>
        <button class="demo-button" id="demo-btn">Click me</button>
        <div class="cursor" id="cursor">
          <svg viewBox="0 0 24 24" fill="black">
            <path d="M5 3l14 8-6 2-3 6z" />
          </svg>
        </div>
        <div class="cursor-click" id="cursor-click"></div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to("#cursor", { opacity: 1, duration: 0.2 }, 0.3);
      tl.to(
        "#cursor",
        { left: 300, top: 500, duration: 1.5, ease: "power2.inOut" },
        0.5
      );
      tl.to(
        "#cursor-click",
        { left: 280, top: 480, opacity: 1, scale: 0, duration: 0.01 },
        2
      );
      tl.to(
        "#cursor-click",
        { scale: 1.5, opacity: 0, duration: 0.4, ease: "power2.out" },
        2
      );
      tl.to(
        "#cursor",
        { left: 500, top: 400, duration: 1.2, ease: "power2.inOut" },
        2.5
      );
      tl.to(
        "#cursor",
        { left: 400, top: 600, duration: 1, ease: "power2.inOut" },
        3.8
      );

      window.__timelines["simulated-cursor"] = tl;
    </script>
  </body>
</html>
