<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spring Pop In</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .pop-card {
        width: 400px;
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        opacity: 0;
        transform: scale(0.5);
      }
      .pop-card h3 {
        font-size: 32px;
        font-weight: 700;
        color: #171717;
        margin-bottom: 12px;
      }
      .pop-card p {
        font-size: 18px;
        color: #71717a;
        line-height: 1.5;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #6366f1;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 60px;
        height: 3px;
        background: #6366f1;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="spring-pop-in"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="scene-content">
        <div class="tag">Spring Pop In</div>
        <div class="line"></div>
        <div class="pop-card" id="pop-card">
          <h3>Spring Physics</h3>
          <p>
            Natural bounce animation with spring-based easing for delightful
            micro-interactions.
          </p>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#pop-card",
        {
          opacity: 1,
          scale: 1,
          duration: 0.8,
          ease: "back.out(2.5)",
        },
        0.5
      );

      window.__timelines["spring-pop-in"] = tl;
    </script>
  </body>
</html>
