<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Line Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        gap: 40px;
        box-sizing: border-box;
      }
      .chart-area {
        width: 100%;
        height: 500px;
        position: relative;
        border-bottom: 2px solid #27272a;
        border-left: 2px solid #27272a;
      }
      .chart-line {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .chart-line svg {
        width: 100%;
        height: 100%;
      }
      .line-path {
        fill: none;
        stroke: #6366f1;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
      }
      .line-fill {
        fill: url(#lineGradient);
        opacity: 0;
      }
      .data-point {
        fill: #818cf8;
        stroke: #0a0a0f;
        stroke-width: 3;
        opacity: 0;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .chart-title {
        font-size: 48px;
        font-weight: 700;
        color: #e2e2e8;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="animated-line-chart"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Trend Analysis</div>
        <div class="chart-title">Growth Trajectory</div>
        <div class="chart-area">
          <div class="chart-line">
            <svg viewBox="0 0 1600 500" preserveAspectRatio="none">
              <defs>
                <linearGradient id="lineGradient" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3" />
                  <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
                </linearGradient>
              </defs>
              <path
                class="line-fill"
                d="M0,400 L200,350 L400,380 L600,250 L800,280 L1000,150 L1200,180 L1400,80 L1600,100 L1600,500 L0,500 Z"
              />
              <path
                class="line-path"
                id="line-path"
                d="M0,400 L200,350 L400,380 L600,250 L800,280 L1000,150 L1200,180 L1400,80 L1600,100"
              />
              <circle class="data-point" cx="0" cy="400" r="8" />
              <circle class="data-point" cx="200" cy="350" r="8" />
              <circle class="data-point" cx="400" cy="380" r="8" />
              <circle class="data-point" cx="600" cy="250" r="8" />
              <circle class="data-point" cx="800" cy="280" r="8" />
              <circle class="data-point" cx="1000" cy="150" r="8" />
              <circle class="data-point" cx="1200" cy="180" r="8" />
              <circle class="data-point" cx="1400" cy="80" r="8" />
              <circle class="data-point" cx="1600" cy="100" r="8" />
            </svg>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#line-path",
        {
          strokeDashoffset: 0,
          duration: 2,
          ease: "power2.out",
        },
        0.5
      );

      tl.to(".line-fill", { opacity: 1, duration: 0.8 }, 1.5);

      var points = document.querySelectorAll(".data-point");
      for (var i = 0; i < points.length; i++) {
        tl.to(points[i], { opacity: 1, duration: 0.2 }, 0.5 + i * 0.25);
      }

      window.__timelines["animated-line-chart"] = tl;
    </script>
  </body>
</html>
