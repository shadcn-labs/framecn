<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Fade Replace</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .fade-container {
        position: relative;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .fade-text {
        font-size: 100px;
        font-weight: 800;
        position: absolute;
      }
      .fade-old {
        color: #52525b;
      }
      .fade-new {
        color: #a78bfa;
        opacity: 0;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #7c5cbf;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #a78bfa;
        border-radius: 2px;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.1;
        background: #7c5cbf;
        top: -200px;
        left: -100px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="text-fade-replace"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="glow"></div>
      <div class="scene-content">
        <div class="tag">Text Fade Replace</div>
        <div class="line"></div>
        <div class="fade-container">
          <div class="fade-text fade-old" id="fade-old">Before</div>
          <div class="fade-text fade-new" id="fade-new">After</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#fade-old",
        { opacity: 0, y: -20, duration: 0.5, ease: "power2.in" },
        0.5
      );
      tl.fromTo(
        "#fade-new",
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
        0.8
      );

      window.__timelines["text-fade-replace"] = tl;
    </script>
  </body>
</html>
