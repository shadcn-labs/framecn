<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Accordion</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 32px;
        box-sizing: border-box;
      }
      .accordion {
        max-width: 900px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .accordion-item {
        background: #14141f;
        border-radius: 12px;
        border: 1px solid #27272a;
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px);
      }
      .accordion-header {
        padding: 20px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
      }
      .accordion-title {
        font-size: 18px;
        font-weight: 600;
        color: #e2e2e8;
      }
      .accordion-icon {
        font-size: 20px;
        color: #71717a;
      }
      .accordion-body {
        padding: 0 24px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .accordion-body-inner {
        padding-bottom: 20px;
        font-family: "JetBrains Mono", monospace;
        font-size: 15px;
        color: #a1a1aa;
        line-height: 1.7;
      }
      .code-kw {
        color: #c084fc;
      }
      .code-str {
        color: #34d399;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="code-accordion"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="10"
    >
      <div class="scene-content">
        <div class="tag">Code Accordion</div>
        <div class="accordion">
          <div class="accordion-item" id="acc-1">
            <div class="accordion-header">
              <span class="accordion-title">Configuration</span
              ><span class="accordion-icon">+</span>
            </div>
            <div class="accordion-body">
              <div class="accordion-body-inner">
                <span class="code-kw">export default</span>
                {<br />&nbsp;&nbsp;port:
                <span class="code-str">3000</span>,<br />&nbsp;&nbsp;host:
                <span class="code-str">"localhost"</span><br />}
              </div>
            </div>
          </div>
          <div class="accordion-item" id="acc-2">
            <div class="accordion-header">
              <span class="accordion-title">API Routes</span
              ><span class="accordion-icon">+</span>
            </div>
            <div class="accordion-body">
              <div class="accordion-body-inner">
                <span class="code-kw">app</span>.<span class="code-str"
                  >get</span
                >(<span class="code-str">"/api/data"</span>, (req, res) => {<br />&nbsp;&nbsp;res.json({
                status: <span class="code-str">"ok"</span> })<br />})
              </div>
            </div>
          </div>
          <div class="accordion-item" id="acc-3">
            <div class="accordion-header">
              <span class="accordion-title">Database</span
              ><span class="accordion-icon">+</span>
            </div>
            <div class="accordion-body">
              <div class="accordion-body-inner">
                <span class="code-kw">const</span> db =
                <span class="code-kw">await</span> connect(<span
                  class="code-str"
                  >"mongodb://..."</span
                >);<br /><span class="code-kw">await</span> db.sync();
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var items = ["#acc-1", "#acc-2", "#acc-3"];
      for (var i = 0; i < items.length; i++) {
        tl.to(
          items[i],
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          0.3 + i * 0.15
        );
      }

      tl.to(
        "#acc-1 .accordion-body",
        { maxHeight: 120, duration: 0.5, ease: "power2.out" },
        1.2
      );
      tl.to("#acc-1 .accordion-icon", { rotation: 45, duration: 0.3 }, 1.2);

      tl.to("#acc-1 .accordion-body", { maxHeight: 0, duration: 0.3 }, 3);
      tl.to(
        "#acc-2 .accordion-body",
        { maxHeight: 120, duration: 0.5, ease: "power2.out" },
        3.3
      );
      tl.to("#acc-2 .accordion-icon", { rotation: 45, duration: 0.3 }, 3.3);

      tl.to("#acc-2 .accordion-body", { maxHeight: 0, duration: 0.3 }, 5.5);
      tl.to(
        "#acc-3 .accordion-body",
        { maxHeight: 100, duration: 0.5, ease: "power2.out" },
        5.8
      );
      tl.to("#acc-3 .accordion-icon", { rotation: 45, duration: 0.3 }, 5.8);

      window.__timelines["code-accordion"] = tl;
    </script>
  </body>
</html>
