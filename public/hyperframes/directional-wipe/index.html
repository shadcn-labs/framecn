<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Directional Wipe</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #scene1 {
        z-index: 1;
        background: #0a0a0f;
      }
      #scene2 {
        z-index: 2;
        background: #0f1a0f;
        opacity: 0;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 24px;
        box-sizing: border-box;
      }
      .s1-title {
        font-size: 120px;
        font-weight: 800;
        color: #e2e2e8;
        letter-spacing: -0.03em;
      }
      .s1-subtitle {
        font-size: 42px;
        font-weight: 400;
        color: #8a8a9a;
      }
      .s2-heading {
        font-size: 100px;
        font-weight: 800;
        color: #4ade80;
        letter-spacing: -0.02em;
      }
      .s2-text {
        font-size: 36px;
        font-weight: 300;
        color: #9ab09a;
      }
      .s2-tag {
        font-size: 20px;
        font-weight: 600;
        color: #2d8a4e;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.12;
        pointer-events: none;
      }
      .glow-green {
        background: #2d8a4e;
        top: -150px;
        right: -100px;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #4ade80;
        border-radius: 2px;
      }
      .wipe-mask {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        clip-path: inset(0 100% 0 0);
        background: #0f1a0f;
      }
      .wipe-edge {
        position: absolute;
        top: 0;
        right: 0;
        width: 60px;
        height: 100%;
        background: linear-gradient(
          to right,
          rgba(74, 222, 128, 0.3),
          transparent
        );
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="directional-wipe"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div id="scene1" class="scene">
        <div class="scene-content">
          <div class="s1-title">Previous</div>
          <div class="s1-subtitle">Content being wiped away</div>
        </div>
      </div>
      <div id="scene2" class="scene">
        <div class="glow glow-green"></div>
        <div class="scene-content">
          <div class="s2-tag">New Section</div>
          <div class="line"></div>
          <div class="s2-heading">Revealed</div>
          <div class="s2-text">Directional wipe from left to right</div>
        </div>
      </div>
      <div class="wipe-mask" id="wipe-mask">
        <div class="wipe-edge"></div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var T = 3.5;
      var wipeDuration = 0.6;

      tl.to(
        "#wipe-mask",
        {
          clipPath: "inset(0 0% 0 0)",
          duration: wipeDuration,
          ease: "power3.inOut",
        },
        T
      );

      tl.to("#scene2", { opacity: 1, duration: 0.01 }, T);
      tl.fromTo(
        "#s2-tag",
        { x: -20, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
        T + 0.1
      );
      tl.fromTo(
        ".line",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.35, ease: "power2.out" },
        T + 0.2
      );
      tl.fromTo(
        "#s2-heading",
        { x: -30, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.5, ease: "expo.out" },
        T + 0.25
      );
      tl.fromTo(
        "#s2-text",
        { x: -20, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
        T + 0.4
      );

      tl.to("#scene1", { opacity: 0, duration: 0.01 }, T + wipeDuration);
      tl.to("#wipe-mask", { opacity: 0, duration: 0.01 }, T + wipeDuration);

      window.__timelines["directional-wipe"] = tl;
    </script>
  </body>
</html>
