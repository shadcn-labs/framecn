<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brush Stroke Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        box-sizing: border-box;
        position: relative;
      }
      .brush-svg {
        width: 800px;
        height: 200px;
      }
      .brush-path {
        fill: none;
        stroke: #6366f1;
        stroke-width: 24;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
      }
      .title {
        font-size: 64px;
        font-weight: 800;
        color: #171717;
        text-align: center;
        opacity: 0;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #6366f1;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="brush-stroke-simulator"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="scene-content">
        <div class="tag">Brush Stroke</div>
        <svg class="brush-svg" viewBox="0 0 800 200">
          <path
            class="brush-path"
            id="brush-1"
            d="M50,100 Q150,30 250,100 T450,100 T650,80 T750,100"
          />
          <path
            class="brush-path"
            id="brush-2"
            d="M50,120 Q150,50 250,120 T450,120 T650,100 T750,120"
            style="stroke: #8b5cf6; stroke-width: 16"
          />
        </svg>
        <div class="title" id="brush-title">Creative Flow</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#brush-1",
        { strokeDashoffset: 0, duration: 1.5, ease: "power1.inOut" },
        0.3
      );
      tl.to(
        "#brush-2",
        { strokeDashoffset: 0, duration: 1.2, ease: "power1.inOut" },
        0.8
      );
      tl.to(
        "#brush-title",
        { opacity: 1, duration: 0.5, ease: "power2.out" },
        1.8
      );

      window.__timelines["brush-stroke-simulator"] = tl;
    </script>
  </body>
</html>
