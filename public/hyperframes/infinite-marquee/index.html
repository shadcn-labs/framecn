<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Marquee</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 32px;
        box-sizing: border-box;
        overflow: hidden;
      }
      .marquee-track {
        display: flex;
        gap: 48px;
        white-space: nowrap;
      }
      .marquee-item {
        font-size: 72px;
        font-weight: 800;
        color: #27272a;
        flex-shrink: 0;
      }
      .marquee-item.accent {
        color: #6366f1;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        padding: 0 80px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="infinite-marquee"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="12"
    >
      <div class="scene-content">
        <div class="tag">Infinite Marquee</div>
        <div class="marquee-track" id="marquee-1">
          <span class="marquee-item">DESIGN</span>
          <span class="marquee-item accent">•</span>
          <span class="marquee-item">BUILD</span>
          <span class="marquee-item accent">•</span>
          <span class="marquee-item">SHIP</span>
          <span class="marquee-item accent">•</span>
          <span class="marquee-item">ITERATE</span>
          <span class="marquee-item accent">•</span>
        </div>
        <div class="marquee-track" id="marquee-2">
          <span class="marquee-item accent">COMPONENTS</span>
          <span class="marquee-item">•</span>
          <span class="marquee-item accent">ANIMATIONS</span>
          <span class="marquee-item">•</span>
          <span class="marquee-item accent">TRANSITIONS</span>
          <span class="marquee-item">•</span>
          <span class="marquee-item accent">EFFECTS</span>
          <span class="marquee-item">•</span>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var m1 = document.getElementById("marquee-1");
      var m2 = document.getElementById("marquee-2");
      m1.innerHTML = m1.innerHTML + m1.innerHTML;
      m2.innerHTML = m2.innerHTML + m2.innerHTML;

      var w1 = m1.scrollWidth / 2;
      var w2 = m2.scrollWidth / 2;

      tl.to("#marquee-1", { x: -w1, duration: 10, ease: "none", repeat: 1 }, 0);
      tl.to("#marquee-2", { x: -w2, duration: 12, ease: "none", repeat: 1 }, 0);

      window.__timelines["infinite-marquee"] = tl;
    </script>
  </body>
</html>
