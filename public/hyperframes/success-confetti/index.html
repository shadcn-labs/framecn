<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Success Confetti</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 200px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 24px;
        box-sizing: border-box;
        position: relative;
      }
      .confetti-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }
      .confetti {
        position: absolute;
        width: 12px;
        height: 12px;
        opacity: 0;
      }
      .title {
        font-size: 80px;
        font-weight: 800;
        color: #171717;
        text-align: center;
      }
      .subtitle {
        font-size: 28px;
        color: #71717a;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="success-confetti"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="confetti-container" id="confetti-container"></div>
      <div class="scene-content">
        <div class="title">Congratulations!</div>
        <div class="subtitle">You've completed the challenge</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var colors = [
        "#6366f1",
        "#8b5cf6",
        "#22c55e",
        "#fbbf24",
        "#ef4444",
        "#3b82f6",
      ];
      var container = document.getElementById("confetti-container");
      var seed = 42;
      function mulberry32(a) {
        return function () {
          a |= 0;
          a = (a + 0x6d2b79f5) | 0;
          var t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      var rng = mulberry32(seed);

      for (var i = 0; i < 50; i++) {
        var el = document.createElement("div");
        el.className = "confetti";
        el.style.left = rng() * 100 + "%";
        el.style.top = "-20px";
        el.style.background = colors[Math.floor(rng() * colors.length)];
        el.style.borderRadius = rng() > 0.5 ? "50%" : "2px";
        el.style.width = 8 + rng() * 8 + "px";
        el.style.height = 8 + rng() * 8 + "px";
        container.appendChild(el);

        var delay = rng() * 1.5;
        var xDrift = (rng() - 0.5) * 400;
        var duration = 2 + rng() * 2;
        var rotation = rng() * 720 - 360;

        tl.to(el, { opacity: 1, duration: 0.1 }, delay);
        tl.to(
          el,
          {
            y: 1100,
            x: xDrift,
            rotation: rotation,
            duration: duration,
            ease: "power1.in",
          },
          delay
        );
        tl.to(el, { opacity: 0, duration: 0.3 }, delay + duration - 0.3);
      }

      window.__timelines["success-confetti"] = tl;
    </script>
  </body>
</html>
