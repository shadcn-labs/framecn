<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Docs Snippet</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      .docs-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        max-width: 800px;
        opacity: 0;
        transform: translateY(20px);
      }
      .docs-header {
        background: #f4f4f5;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #e4e4e7;
      }
      .docs-badge {
        background: #6366f1;
        color: white;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .docs-title {
        font-size: 16px;
        font-weight: 600;
        color: #3f3f46;
      }
      .docs-body {
        padding: 24px;
        font-family: "JetBrains Mono", monospace;
        font-size: 15px;
        line-height: 1.8;
        color: #3f3f46;
      }
      .docs-highlight {
        background: #fef3c7;
        padding: 2px 6px;
        border-radius: 4px;
        color: #92400e;
      }
      .docs-comment {
        color: #71717a;
      }
      .tag {
        font-size: 20px;
        font-weight: 600;
        color: #6366f1;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="visual-docs-snippet"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="8"
    >
      <div class="scene-content">
        <div class="tag">Docs Snippet</div>
        <div class="docs-card" id="docs-card">
          <div class="docs-header">
            <span class="docs-badge">API</span>
            <span class="docs-title">createApp(options)</span>
          </div>
          <div class="docs-body">
            <span class="docs-comment">// Initialize a new application</span
            ><br />
            <span class="docs-highlight">const app = createApp({</span><br />
            &nbsp;&nbsp;name:
            <span class="docs-highlight">"my-app"</span>,<br />
            &nbsp;&nbsp;plugins: [auth, analytics]<br />
            <span class="docs-highlight">})</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.to(
        "#docs-card",
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
        0.3
      );

      window.__timelines["visual-docs-snippet"] = tl;
    </script>
  </body>
</html>
